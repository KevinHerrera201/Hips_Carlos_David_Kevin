<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Hipstagram</title>
</head>
<link rel="stylesheet" href="/styles.css">
<div class="auth-container">
<body>
    <h2>Crear Cuenta</h2>
    <form id="registerForm">
        <input type="text" id="usuario" placeholder="Usuario" required><br><br>
        <input type="email" id="correo" placeholder="Correo" required><br><br>
        <input type="password" id="password" placeholder="Contraseña" required><br><br>
        <select id="rol" required>
          <option value="usuario">Usuario normal</option>
          <option value="admin">Administrador</option>
        </select><br><br>
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="/">Inicia sesión aquí</a></p>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const rol = document.getElementById('rol').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, correo, password, rol })
            });

            const data = await res.json();
            if (res.ok) {
                alert('Usuario creado correctamente. Ahora puedes iniciar sesión.');
                window.location.href = '/'; // Redirige al login
            } else {
                alert('Error: ' + data.error);
            }
        });
    </script>
</div>
</body>
</html>
