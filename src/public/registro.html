<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Hipstagram</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="login-page">

  <div class="login-wrapper">

    <section class="login-hero register-hero">
      <div class="hero-overlay">
        <h1>Únete a Hipstagram</h1>
        <p>Crea tu cuenta, comparte tus mejores momentos y conecta con la comunidad.</p>
      </div>
    </section>

    <section class="login-card">
      <div class="login-header">
        <h2>Crear cuenta</h2>
        <p>Completa tus datos para registrarte</p>
      </div>

      <form id="registerForm" class="login-form">
        <div class="input-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" placeholder="Tu nombre de usuario" required>
        </div>

        <div class="input-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Crea una contraseña segura" required>
          <small id="passwordHelp" class="password-help error">
            Debe contener una mayúscula y un número
          </small>
        </div>

        <button type="submit" class="login-btn">Registrarse</button>
      </form>

      <p class="register-text">
        ¿Ya tienes cuenta?
        <a href="/">Inicia sesión aquí</a>
      </p>
    </section>

  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const helpText = document.getElementById('passwordHelp');

    passwordInput.addEventListener('input', () => {
      const regex = /^(?=.*[A-Z])(?=.*\d).+$/;

      if (regex.test(passwordInput.value)) {
        helpText.className = 'password-help success';
        helpText.textContent = 'Contraseña válida ✔';
      } else {
        helpText.className = 'password-help error';
        helpText.textContent = 'Debe contener una mayúscula y un número';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const usuario = document.getElementById('usuario').value.trim();
      const correo = document.getElementById('correo').value.trim();
      const password = document.getElementById('password').value;

      const passwordSegura = /^(?=.*[A-Z])(?=.*\d).+$/;

      if (!passwordSegura.test(password)) {
        alert('La contraseña debe tener al menos una letra mayúscula y un número.');
        return;
      }

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, correo, password })
      });

      const data = await res.json();

      if (res.ok) {
        alert('Usuario creado correctamente. Ahora puedes iniciar sesión.');
        window.location.href = '/';
      } else {
        alert('Error: ' + data.error);
      }
    });
  </script>

</body>
</html>
