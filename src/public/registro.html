<!DOCTYPE html>
<html>
<head>
  <title>Registro - Hipstagram</title>
</head>

<body>

<h2>Registro</h2>

<input id="usuario" placeholder="Usuario"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<select id="rol">
  <option value="usuario">Usuario</option>
  <option value="admin">Administrador</option>
</select>

<br><br>

<button onclick="registrar()">Guardar</button>
<button onclick="cancelar()">Cancelar</button>

<p id="mensaje"></p>

<script>
console.log("JS cargado");

async function registrar() {
  console.log("CLICK DETECTADO");

  const usuario = document.getElementById("usuario").value;
  const password = document.getElementById("password").value;
  const rol = document.getElementById("rol").value;

  console.log({ usuario, password, rol });

  const res = await fetch("http://localhost:3000/register", {

  });

  const data = await res.json();

  document.getElementById("mensaje").innerText = data.message;
}

function cancelar() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
