<!DOCTYPE html>
<html>
<head>
  <title>Registro - Hipstagram</title>
</head>
<body>

  <h2>Registrar Usuario</h2>

  <!-- INPUT USUARIO -->
  <input type="text" id="usuario" placeholder="Usuario"><br><br>

  <!-- INPUT PASSWORD -->
  <input type="password" id="password" placeholder="Contraseña"><br><br>

  <!-- SELECCIÓN DE ROL -->
  <h3>Seleccione tipo de usuario:</h3>
  <select id="rol">
    <option value="usuario">Usuario</option>
    <option value="admin">Administrador</option>
  </select>

  <br><br>

  <!-- BOTONES -->
  <button onclick="registrar()">Guardar</button>
  <button onclick="cancelar()">Cancelar</button>

  <!-- MENSAJE -->
  <p id="mensaje"></p>

  <script>
    async function registrar() {
      const usuario = document.getElementById("usuario").value;
      const password = document.getElementById("password").value;
      const rol = document.getElementById("rol").value;

      // Validación básica
      if (!usuario || !password) {
        document.getElementById("mensaje").innerText = "Complete todos los campos";
        return;
      }

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ usuario, password, rol })
        });

        const data = await res.json();

        document.getElementById("mensaje").innerText = data.message;

        // Si se registra correctamente
        if (data.success) {
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);
        }

      } catch (error) {
        document.getElementById("mensaje").innerText = "Error al conectar con el servidor";
      }
    }

    function cancelar() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
