<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Hipstagram</title>
</head>
<link rel="stylesheet" href="/styles.css">
<div class="auth-container"> 
<body>
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <input type="email" id="correo" placeholder="Correo" required><br><br>
        <input type="password" id="password" placeholder="Contraseña" required><br><br>
        <button type="submit">Entrar</button>
    </form>
    <p>¿No tienes cuenta? <a href="/registro.html">Regístrate aquí</a></p>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });

            const data = await res.json();
           if (res.ok) {
                // Guardamos el nombre del usuario y redirigimos
                localStorage.setItem('usuarioLogeado', data.usuario);
                window.location.href = '/home.html';
            } else {
                alert('Error: ' + data.error);
            }
        });
    </script>
</div>
</body>
</html>
