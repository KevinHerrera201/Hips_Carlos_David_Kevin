<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hipstagram</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="login-page">

  <div class="login-wrapper">

    <section class="login-hero">
      <div class="hero-overlay">
        <h1>Hipstagram</h1>
        <p>Comparte momentos, conecta con amigos y descubre nuevas historias.</p>
      </div>
    </section>

    <section class="login-card">
      <div class="login-header">
        <h2>Bienvenido</h2>
        <p>Inicia sesión para continuar</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="login-btn">Entrar</button>
      </form>

      <p class="register-text">
        ¿No tienes cuenta?
        <a href="/registro.html">Regístrate aquí</a>
      </p>
    </section>

  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const correo = document.getElementById('correo').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('usuarioLogeado', data.usuario);
        window.location.href = '/home.html';
      } else {
        alert('Error: ' + data.error);
      }
    });
  </script>

</body>
</html>
