<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Home - Hipstagram</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Hipstagram</div>
        
        <div class="nav-center">
            <input type="text" id="buscador" placeholder="Buscar usuarios o posts..." class="search-input">
        </div>

        <div class="nav-links">
            <a href="/home.html" class="nav-btn" title="Home">🏠</a>
            <button class="nav-btn" title="Subir contenido" onclick="abrirSubirContenido()">➕</button>
            <a href="/admin.html" class="nav-btn" title="Panel de Administrador">👤</a>
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 id="mensajeBienvenida">Cargando...</h1>
        <p>Bienvenido a tu panel principal. Aquí construiremos el resto de la aplicación.</p>
    </div>

    <script>
        const usuario = localStorage.getItem('usuarioLogeado');
        if (!usuario) {
            window.location.href = '/';
        } else {
            document.getElementById('mensajeBienvenida').innerText = '¡Hola, ' + usuario + '!';
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioLogeado');
            window.location.href = '/';
        }
    </script>
</body>
</html>
